<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <title>Grammar Practice App</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { -webkit-tap-highlight-color: transparent; }
    body { -webkit-text-size-adjust: 100%; }
    input[type="text"] { font-size: 18px !important; }
    button { touch-action: manipulation; cursor: pointer; }
    .btn-check {
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: white;
      font-size: 1.25rem;
      font-weight: 700;
      padding: 1.1rem 2rem;
      border-radius: 1rem;
      width: 100%;
      border: none;
      box-shadow: 0 4px 14px rgba(34,197,94,0.4);
      transition: transform 0.1s, box-shadow 0.1s;
    }
    .btn-check:active { transform: scale(0.97); box-shadow: 0 2px 8px rgba(34,197,94,0.3); }
    .game-input {
      font-size: 18px;
      padding: 14px 18px;
      border: 2.5px solid #d1d5db;
      border-radius: 0.75rem;
      width: 100%;
      outline: none;
      transition: border-color 0.2s;
    }
    .game-input:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,0.2); }
  </style>
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen flex flex-col items-center justify-start p-4 pt-6">

  <!-- Pantalla 1 - Selección de Categoría -->
  <div id="category-screen" class="w-full max-w-lg p-6 bg-white rounded-3xl shadow-xl">
    <h1 class="text-3xl font-extrabold text-center text-gray-800 mb-4">🎓 Grammar Practice</h1>
    <p class="text-center text-gray-500 mb-6 text-base">Elige una categoría para practicar</p>
    <div class="flex flex-col gap-4">
      <button onclick="goToSubcategories('present')" class="bg-blue-500 active:bg-blue-700 text-white text-xl font-bold px-6 py-5 rounded-2xl w-full shadow-md">🔵 Present</button>
      <button onclick="goToSubcategories('past')" class="bg-rose-500 active:bg-rose-700 text-white text-xl font-bold px-6 py-5 rounded-2xl w-full shadow-md">🔴 Past</button>
      <button onclick="goToSubcategories('future')" class="bg-purple-600 active:bg-purple-800 text-white text-xl font-bold px-6 py-5 rounded-2xl w-full shadow-md">🟣 Future</button>
      <button onclick="goToSubcategories('gerund')" class="bg-emerald-500 active:bg-emerald-700 text-white text-xl font-bold px-6 py-5 rounded-2xl w-full shadow-md">🟢 Gerund</button>
      <button onclick="startMixtGame()" class="bg-amber-400 active:bg-amber-600 text-white text-xl font-bold px-6 py-5 rounded-2xl w-full shadow-md">🌈 Mixt</button>
    </div>
  </div>

  <!-- Pantalla 2 - Subcategorías según la categoría seleccionada -->
  <div id="subcategory-screen" class="hidden w-full max-w-lg p-6 bg-white rounded-3xl shadow-xl">
    <h1 class="text-2xl font-extrabold text-center mb-2" id="subcategory-title"></h1>
    <p class="text-center text-gray-500 mb-5 text-base">Selecciona una subcategoría</p>
    <div class="flex flex-col gap-4" id="subcategory-buttons">
      <!-- Los botones de subcategoría se generarán aquí -->
    </div>
    <div class="mt-5">
      <button onclick="goToMainMenu()" class="bg-orange-500 active:bg-orange-700 text-white text-lg font-bold px-6 py-4 rounded-2xl w-full shadow-md">← Menú Principal</button>
    </div>
  </div>

  <!-- Pantalla de Juego -->
  <div id="game-screen" class="hidden w-full max-w-lg bg-white rounded-3xl shadow-xl overflow-hidden">
    <!-- Header -->
    <div class="bg-gray-50 px-5 pt-5 pb-4 border-b border-gray-100">
      <h1 class="text-xl font-extrabold text-center" id="category-title">Juego</h1>
      <div id="question-counter" class="text-center text-gray-500 text-sm font-medium mt-1"></div>
    </div>

    <!-- Pregunta -->
    <div class="px-5 py-5">
      <div id="sentence" class="text-lg text-center text-gray-800 font-semibold leading-relaxed min-h-16"></div>
    </div>

    <!-- Input + botón Comprobar -->
    <div class="px-5 pb-4">
      <input type="text" id="user-input" class="game-input mb-3" placeholder="Escribe tu respuesta aquí..." autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false" />
      <button onclick="checkAnswer()" id="check-button" class="btn-check">✅ Comprobar</button>
    </div>

    <!-- Feedback -->
    <div id="feedback" class="text-center px-5 text-lg font-bold min-h-7"></div>
    <div id="translation" class="text-center px-5 mt-1 text-gray-500 text-sm hidden pb-2"></div>
    <div id="clue" class="text-center px-5 mt-1 text-blue-700 font-semibold text-sm hidden pb-2"></div>

    <!-- Botón Siguiente (aparece tras comprobar) -->
    <div class="px-5 pb-4 mt-2">
      <button onclick="nextSentence()" id="next-button"
        class="bg-lime-500 active:bg-lime-700 text-white text-lg font-bold px-6 py-4 rounded-2xl w-full shadow-md opacity-50 cursor-not-allowed"
        disabled>Siguiente Pregunta →</button>
    </div>

    <!-- Marcador -->
    <div class="flex items-center justify-center gap-4 px-5 py-3 bg-gray-50 border-t border-gray-100">
      <span class="text-green-600 font-bold text-base">✅ <span id="correct">0</span></span>
      <span class="text-gray-300 text-xl">|</span>
      <span class="text-red-500 font-bold text-base">❌ <span id="incorrect">0</span></span>
      <button id="retry-button" onclick="retryFailedQuestions()"
        class="bg-red-500 active:bg-red-700 text-white px-4 py-2 rounded-xl text-sm font-bold"
        style="display:none;">
        Reintentar falladas
      </button>
    </div>

    <!-- Botones secundarios -->
    <div class="px-5 py-4 flex flex-col gap-3 border-t border-gray-100">
      <div class="grid grid-cols-2 gap-3">
        <button onclick="showClue()" class="bg-pink-500 active:bg-pink-700 text-white text-base font-bold py-4 rounded-2xl shadow-md">💡 Pista</button>
        <button onclick="showTranslation()" class="bg-indigo-500 active:bg-indigo-700 text-white text-base font-bold py-4 rounded-2xl shadow-md">🌍 Traducción</button>
      </div>
      <button onclick="goToMainMenu()" class="bg-orange-500 active:bg-orange-700 text-white text-base font-bold py-4 rounded-2xl w-full shadow-md">← Menú Principal</button>
    </div>
  </div>

    const subcategoryScreen = document.getElementById('subcategory-screen');
    const gameScreen = document.getElementById('game-screen');
    const categoryTitle = document.getElementById('category-title');

    const inputEl = document.getElementById('user-input');
    const feedbackEl = document.getElementById('feedback');
    const correctEl = document.getElementById('correct');
    const incorrectEl = document.getElementById('incorrect');
    const translationEl = document.getElementById('translation');
    const clueEl = document.getElementById('clue');
    const subcategoryButtons = document.getElementById('subcategory-buttons');
    const subcategoryTitle = document.getElementById('subcategory-title');
    const questionCounterEl = document.getElementById('question-counter');
    const nextButton = document.getElementById('next-button');
    const retryButton = document.getElementById('retry-button');

  // Función para ir a la pantalla de subcategorías
function goToSubcategories(category) {
  if (category === 'gerund') {
    // No mostrar subcategorías, iniciar el juego directamente
    startCategoryGame(category, null);  // subcategory null o vacío
    return;
  }

  // Para las demás categorías con subcategorías
  subcategoryScreen.classList.remove('hidden');
  categoryScreen.classList.add('hidden');
  gameScreen.classList.add('hidden');
  subcategoryTitle.textContent = `Subcategorías de ${capitalize(category)}`;
  subcategoryButtons.innerHTML = '';

  const colorPalettes = {
    present: ['bg-blue-800 hover:bg-blue-1000', 'bg-blue-500 hover:bg-blue-700', 'bg-sky-300 hover:bg-blue-400'],
    past: ['bg-red-800 hover:bg-red-1000', 'bg-red-600 hover:bg-red-700', 'bg-red-500 hover:bg-red-600'],
    future: ['bg-purple-800 hover:bg-purple-1000', 'bg-purple-600 hover:bg-purple-700', 'bg-purple-500 hover:bg-purple-600'],
  };

  const subcategories = Object.keys(allSentences[category]);
  const palette = colorPalettes[category] || ['bg-cyan-500 hover:bg-cyan-800'];

  subcategories.forEach((subcategory, index) => {
    const button = document.createElement('button');
    const colorClass = palette[index % palette.length];
    button.textContent = capitalize(subcategory);
    button.className = `text-white px-6 py-3 rounded-xl m-2 w-full ${colorClass}`;
    button.onclick = () => startCategoryGame(category, subcategory);
    subcategoryButtons.appendChild(button);
  });
}

// Función para iniciar el juego de una subcategoría
function startCategoryGame(category, subcategory) {
  resetGameCounters();

  if (category === 'gerund') {
    // Gerund es un array simple
    currentSentences = shuffleArray([...allSentences[category]]);
  } else if (subcategory) {
    currentSentences = shuffleArray([...allSentences[category][subcategory]]);
  } else {
    // En caso de que subcategory sea null en otra categoría, vaciar
    currentSentences = [];
  }

  currentCategory = category;
  currentSubcategory = subcategory || '';

  categoryTitle.textContent = subcategory ? `${capitalize(category)} - ${capitalize(subcategory)}` : capitalize(category);

  subcategoryScreen.classList.add('hidden');
  categoryScreen.classList.add('hidden');
  gameScreen.classList.remove('hidden');

  loadSentence();
}

// Función para iniciar el juego mixto
function startMixtGame() {
  resetGameCounters();
  currentSentences = [];

  const allCategories = ['present', 'past', 'future', 'gerund'];
  allCategories.forEach(category => {
    if (Array.isArray(allSentences[category])) {
      allSentences[category].forEach(sentence => {
        currentSentences.push({ ...sentence, category });
      });
    } else {
      const subcategories = Object.keys(allSentences[category]);
      subcategories.forEach(subcategory => {
        const sentences = allSentences[category][subcategory];
        sentences.forEach(sentence => {
          currentSentences.push({ ...sentence, category });
        });
      });
    }
  });

  currentSentences = shuffleArray(currentSentences).slice(0, 20); // ← aquí limitamos a 20

  currentCategory = 'Mixt';
  currentSubcategory = '';
  categoryTitle.textContent = 'Mixt';

  subcategoryScreen.classList.add('hidden');
  categoryScreen.classList.add('hidden');
  gameScreen.classList.remove('hidden');

  loadSentence();
}

// Función para cargar la oración actual
function loadSentence() {
  if (current >= currentSentences.length) {
    finishGame();
    return;
  }
  const sentence = currentSentences[current];
  sentenceEl.textContent = sentence.text;

  // Actualiza contador
  questionCounterEl.textContent = `Pregunta ${current + 1} de ${currentSentences.length}`;

  inputEl.value = '';
  feedbackEl.textContent = '';
  feedbackEl.classList.remove('text-green-500', 'text-red-500');
  translationEl.textContent = sentence.translation || '';
  translationEl.classList.add('hidden');
  clueEl.textContent = '';
  clueEl.classList.add('hidden');
  inputEl.disabled = false;
  inputEl.focus();

  // Re-habilitar botón comprobar
  const checkBtn = document.getElementById('check-button');
  if (checkBtn) { checkBtn.disabled = false; checkBtn.classList.remove('opacity-50'); }

  document.getElementById('next-button').disabled = true;
  document.getElementById('next-button').classList.add('opacity-50', 'cursor-not-allowed');
}

// Función para avanzar a la siguiente oración
function nextSentence() {
  current++;
  loadSentence();
}

// Función para verificar la respuesta
function checkAnswer() {
  const userAnswer = inputEl.value.trim().toLowerCase();
  if (!userAnswer) return;

  // Deshabilitar botón comprobar
  const checkBtn = document.getElementById('check-button');
  if (checkBtn) { checkBtn.disabled = true; checkBtn.classList.add('opacity-50'); }

  const sentence = currentSentences[current];
  const correctAnswer = (sentence.answer || sentence.correct || '').toLowerCase();

  if (userAnswer === correctAnswer) {
    correctCount++;
    feedbackEl.textContent = '¡Correcto!';
    feedbackEl.classList.remove('text-red-500');
    feedbackEl.classList.add('text-green-500');
  } else {
    incorrectCount++;
    feedbackEl.textContent = `Incorrecto. La respuesta correcta es: "${correctAnswer}"`;
    feedbackEl.classList.remove('text-green-500');
    feedbackEl.classList.add('text-red-500');

    if (!failedQuestionsByCategory[currentCategory]) {
      failedQuestionsByCategory[currentCategory] = [];
    }
    failedQuestionsByCategory[currentCategory].push(sentence);
  }

  correctEl.textContent = correctCount;
  incorrectEl.textContent = incorrectCount;

  translationEl.classList.remove('hidden');

  if (sentence.structure) {
    clueEl.textContent = `Pista: ${sentence.structure}`;
    clueEl.classList.remove('hidden');
  } else {
    clueEl.textContent = '';
    clueEl.classList.add('hidden');
  }

  // **Aquí habilitamos el botón para avanzar**
  const nextButton = document.getElementById('next-button');
  nextButton.disabled = false;
  nextButton.classList.remove('opacity-50', 'cursor-not-allowed');
}

// Función para mostrar pista manualmente (botón "Pista")
function showClue() {
  const sentence = currentSentences[current];
  if (sentence.tense) {
    clueEl.textContent = `Tiempo verbal: ${sentence.tense}`;
  } else if (sentence.structure) {
    clueEl.textContent = `Pista: ${sentence.structure}`;
  } else {
    clueEl.textContent = 'No hay pista disponible para esta oración.';
  }
  clueEl.classList.remove('hidden');
}

// Función para volver al menú principal
function goToMainMenu() {
  current = 0;
  resetGameCounters();
  gameScreen.classList.add('hidden');
  subcategoryScreen.classList.add('hidden');
  categoryScreen.classList.remove('hidden');
}

// Función para finalizar el juego
function finishGame() {
  alert(`Juego terminado.\nCorrectas: ${correctCount}\nIncorrectas: ${incorrectCount}`);

  // Si hay preguntas falladas, pregunta si quieren repetir
  if (failedQuestionsByCategory[currentCategory] && failedQuestionsByCategory[currentCategory].length > 0) {
    const retry = confirm("¿Quieres intentar las preguntas falladas?");
    if (retry) {
      retryFailedQuestions();
      return;
    }
  }

  goToMainMenu();
}

// Función para reiniciar contadores
function resetGameCounters() {
  current = 0;
  correctCount = 0;
  incorrectCount = 0;
  correctEl.textContent = '0';
  incorrectEl.textContent = '0';
}

// Función para capitalizar texto
function capitalize(str) {
  return str.charAt(0).toUpperCase() + str.slice(1);
}


// Función para traduccir
function showTranslation() {
  const sentence = currentSentences[current];
  if (sentence.translation) {
    translationEl.textContent = sentence.translation;
    translationEl.classList.remove('hidden');
  } else {
    translationEl.textContent = 'No hay traducción disponible.';
    translationEl.classList.remove('hidden');
  }
}

// Función para rehacer las preguntas falladas solo de la categoría actual
function retryFailedQuestions() {
  const failed = failedQuestionsByCategory[currentCategory];

  if (!failed || failed.length === 0) {
    alert("No hay preguntas falladas para intentar nuevamente.");
    return;
  }

  currentSentences = shuffleArray([...failed]);

  current = 0;
  correctCount = 0;
  incorrectCount = 0;
  correctEl.textContent = correctCount;
  incorrectEl.textContent = incorrectCount;
  totalQuestions = currentSentences.length;
  totalQuestionsEl.textContent = totalQuestions;

  // Vaciar preguntas falladas para no repetir infinitamente
  failedQuestionsByCategory[currentCategory] = [];

  loadSentence();
}


// Función para barajar un array (Fisher-Yates)
function shuffleArray(array) {
  let currentIndex = array.length, temporaryValue, randomIndex;

  while (0 !== currentIndex) {
    randomIndex = Math.floor(Math.random() * currentIndex);
    currentIndex--;

    temporaryValue = array[currentIndex];
    array[currentIndex] = array[randomIndex];
    array[randomIndex] = temporaryValue;
  }

  return array;
}

// Evento para verificar la respuesta cuando el usuario presiona Enter
inputEl.addEventListener('keyup', function(e) {
  if (e.key === 'Enter') {
    const nextBtn = document.getElementById('next-button');
    if (!nextBtn.disabled) {
      nextSentence();
    } else {
      checkAnswer();
    }
  }
});
